name: AutoInfra Optimization Flywheel

on:
  # schedule:
  #   - cron: '0 0 * * 0' # Run weekly on Sunday — DISABLED until accuracy gate is validated
  workflow_dispatch: # Allow manual trigger

jobs:
  evaluate-and-optimize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write # Needed to commit changes
      id-token: write # Needed for GCP authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'webapp/package-lock.json'

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          # Alternative: Workload Identity Federation
          # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Cloud Evaluation (batch-evaluate-cloud.ts)
        working-directory: webapp
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          npx tsx src/scripts/batch-evaluate-cloud.ts

      - name: Download Latest Scoreboards from GCS
        working-directory: webapp
        run: |
          mkdir -p scoreboards
          gsutil -m cp "gs://${{ secrets.GCS_BUCKET }}/scoreboards/*.csv" scoreboards/
          # Combine scoreboards
          echo 'Project,MH_Structures,MH_Catchbasins,Sewers,Watermain,Overall,TotalCells,MatchingCells' > scoreboards/combined.csv
          tail -q -n +2 scoreboards/evaluation_scoreboard_*.csv >> scoreboards/combined.csv

      - name: Run Gated Flywheel Optimization
        id: gate
        working-directory: webapp
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          npx tsx src/scripts/flywheel-gate.ts scoreboards/combined.csv
          
          # Check if gate produced changes to commit
          if [ -f flywheel-gate-result.json ]; then
            PASSED=$(cat flywheel-gate-result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('passed', False))")
            echo "gate_passed=$PASSED" >> $GITHUB_OUTPUT
          else
            echo "gate_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Pull latest changes to avoid push rejection
        if: steps.gate.outputs.gate_passed == 'True'
        run: |
          # Fetch and rebase latest changes, stashing uncommitted modifications if any
          git pull --rebase --autostash origin master || true

      - name: Commit Automated Optimizations
        if: steps.gate.outputs.gate_passed == 'True'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: apply gated flywheel optimizations (gate passed)"
          file_pattern: 'webapp/src/lib/dynamic-rules.json few_shot_examples.json'
          branch: master
          commit_user_name: "AutoInfra Flywheel"
          commit_user_email: "bot@autoinfra.com"

      - name: Log Gate Rejection
        if: steps.gate.outputs.gate_passed != 'True'
        run: |
          echo "⛔ Flywheel gate did not pass — no changes committed."
          if [ -f webapp/flywheel-gate-result.json ]; then
            cat webapp/flywheel-gate-result.json
          fi

